# Re-resolve every cited PMID against Europe PMC on a schedule.
#
# The PR gate (`content:validate`) is hermetic — it asserts against the committed cache
# data/citations.verified.json and never touches the network, so it can't flake. This job is
# the other half: it catches things that change *after* a citation ships — a paper being
# retracted, an erratum being issued, or a record being corrected upstream.
#
# Opens/updates a labelled issue on failure, mirroring uptime.yml.
name: citations

on:
  schedule:
    - cron: '17 6 * * 1' # Mondays ~06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Re-resolve every cited PMID
        id: verify
        run: npm run citations:verify 2>&1 | tee citation-report.txt
      - name: Open or update the tracking issue
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('citation-report.txt', 'utf8').slice(0, 60000);
            } catch {
              report = 'The verifier produced no report — it likely failed before running.';
            }
            const title = 'Citation verification failed';
            const body = [
              'The scheduled citation re-check found a problem. A cited paper may have been',
              'retracted, corrected, or had its record changed upstream.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '```',
              report,
              '```',
            ].join('\n');
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'citations',
            });
            if (open.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['citations'],
              });
            }
