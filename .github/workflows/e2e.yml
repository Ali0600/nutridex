name: E2E

# Playwright end-to-end tests for the critical user flows (search, quiz, compare)
# against a real production build. Runs on every PR except docs-only ones — this is
# NOT a required check (only ci + preflight are), so skipping it can't block a merge.
on:
  pull_request:
    paths-ignore:
      - '**/*.md'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser + OS deps
        # `--with-deps` runs apt-get update, which intermittently fails on the runner's
        # preinstalled Microsoft/Azure apt repos (bad InRelease / NOSPLIT). Drop those
        # third-party sources so apt only hits Ubuntu mirrors, and retry on transient blips.
        run: |
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* 2>/dev/null || true
          for attempt in 1 2 3; do
            if npx playwright install --with-deps chromium; then exit 0; fi
            echo "playwright install attempt ${attempt} failed; retrying in 15s…"
            sleep 15
          done
          echo "::error::playwright install failed after 3 attempts"; exit 1

      - name: Run E2E tests (builds + serves the app)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
