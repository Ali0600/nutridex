# Generated by `preflight plan` — target: Node 22
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        patterns: ['*']
        update-types: [minor, patch]
    ignore:
      # Next.js lockstep set — coordinated by the framework.
      # Update with `npx @next/codemod upgrade`, not per-package bumps.
      - dependency-name: next
      - dependency-name: eslint-config-next
      - dependency-name: '@next/*'

  # Added by hand — `preflight plan` doesn't emit this ecosystem (dogfood finding).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
